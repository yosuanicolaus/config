# OFFICIAL DOCS - https://espanso.org/docs/

global_vars:
  - name: SCRIPT
    type: shell
    params:
      cmd: "echo ~/.config/espanso/scripts"

  - name: my_date
    type: date
    params:
      format: "%y%m%d"

  - name: my_jp_date
    type: shell
    params:
      cmd: "python3 -c \"print('{{my_date}}'.translate(str.maketrans('0123456789', 'пЉРпЉСпЉТпЉУпЉФпЉХпЉЦпЉЧпЉШпЉЩ')))\""

  - name: mytime
    type: date
    params:
      format: "%H:%M"

matches:

