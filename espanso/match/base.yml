  # Date & Time (uses global variables)
  - trigger: ":date"
    replace: "{{my_date}}"
  - trigger: ":sdate"
    replace: "[{{my_date}}]"
  - trigger: ":jdate"
    replace: "гАМ{{my_date}}гАН"
  - trigger: ":jpdate"
    replace: "гАМ{{my_jp_date}}гАН"
