  # Stars script (0~5)
  # :s[0~5] prints close stars (вҳ…вҳ…вҳ…вҳ…вҳ…)
  # :ss[0~5] prints distant stars (вҳ… вҳ… вҳ… вҳ… вҳ… )
  # :S~ / :SS~ prints on 10 stars system (ST/SST for full 10 star)
  # :-s[0~5] (or other type of s) appends "- " at the start
  - regex: ":(?P<trigger>((-|j)?((s|ss)[0-5]|(S|SS)[0-9]|ST|SST)))"
    replace: "{{output}} "
    force_clipboard: true
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 \"{{SCRIPT}}/stars.py\" {{trigger}}"

  - trigger: ":j-"
    replace: "гғ»"

  - regex: ":ou(?P<trigger>([1-3][1-4][0-1][1-9]))"
    replace: "{{output}} "
    force_clipboard: true
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 \"{{SCRIPT}}/ou.py\" {{trigger}}"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{my_date}}"
  - trigger: ":sdate"
    replace: "[{{my_date}}]"
  - trigger: ":jdate"
    replace: "гҖҢ{{my_date}}гҖҚ"
  - trigger: ":jpdate"
    replace: "гҖҢ{{my_jp_date}}гҖҚ"
    force_clipboard: true

  # 251108 Print the current time
  - trigger: ":time"
    replace: "{{mytime}}"

  - trigger: ":stime"
    replace: "[{{mytime}}]"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/
